# Example config.yaml -- the real, content-level config (see
# internal/config and internal/bootstrap's package docs for the full
# split rationale). Two ways to get this file onto the VM:
#
#   1. EASY: cloud-init writes it directly (see cloud-init/user-data.yaml's
#      plain config.yaml write_files entry, or -config-file on
#      cmd/verify-mseg-tester) -- no repo, no token. Changing it means
#      editing and re-provisioning.
#   2. Set bootstrap.yaml's configRepo to a repo URL holding this same
#      file -- it's then fetched/refreshed at runtime (internal/configsync)
#      on every boot on updateSegment, and changing it is a commit, not a
#      re-provision. Only needed once you actually want that.
#
# dnsServer6/routingCheck6 are optional -- see internal/config's doc
# comments. Worth setting on a dual-stack network like this one: OVN here
# can only ever deliver a SOLICITED router advertisement (its own
# periodic RA is unconditionally dropped -- see internal/checks' package
# doc), so these checks double as an ongoing regression check for that,
# not just IPv4/IPv6 parity.
#
# dnsCheck has two independent, both-optional groups -- local and remote
# -- each just a list of records to resolve (tests) plus an optional
# server override:
#   - local:  no server set -> queries BOTH dnsServer (IPv4) and
#             dnsServer6 (IPv6, if set) for every test. Set server to
#             query only that one address instead.
#   - remote: no server set -> uses the system's default resolver
#             (whatever /etc/resolv.conf points at -- normally this
#             segment's own resolver too, via DHCP). Set server to dial
#             a specific address instead (e.g. a public resolver).
# Listing a real local record AND a public one (e.g. google.com) in the
# same group's tests catches "answers its own zone but doesn't forward
# upstream" and vice versa -- two separate, real failure modes.
#
# reverseCheck/reverseCheck6 are optional too -- confirm the segment's own
# resolver also answers PTR (rDNS) queries correctly, not just forward
# ones (a resolver's forward zone can be fine while its PTR zone is
# stale/wrong). Only set on 128/129 below: those are the two segments
# with a real local gateway host to reverse-resolve; 130/131 are
# WireGuard geo-exits, a different kind of check entirely (geoCheck).
# The domain below (adviser.com) is real and intentionally public.

rebootDelay: "6m"   # only applies on updateSegment, after that segment's checks+update+report -- every other segment always reboots immediately. omit/"" for immediate everywhere.

checkAttempts: 3       # how many times to try EACH check before giving up on it. stops as soon as one attempt passes. defaults to 3 if omitted.
checkRetryDelay: "10s" # wait between attempts of the SAME check. defaults to "10s" if omitted.

report:
  # Writes straight into an existing InfluxDB v2 instance -- see
  # internal/report.PushInflux. "url" is InfluxDB's own base URL, not a
  # path you have to build yourself. "token" MUST be a write-only token
  # scoped to ONLY this one bucket (`influx auth create --write-bucket
  # <id>`) -- never the InfluxDB admin/all-access token.
  #
  # "${INFLUX_TOKEN}" here is NOT a literal value -- it's expanded at
  # load time (internal/envfile) from bootstrap.yaml's EnvFile (defaults
  # to /etc/mseg-tester/.env, written once by cloud-init, 0600, never
  # synced anywhere) or the real process environment. This is what lets
  # config.yaml itself -- which may be fetched from a shared or even
  # public configRepo -- stay free of the actual secret; only the small,
  # local-only .env file ever holds it.
  influx:
    url: "https://mam-influx.adviser.com"
    org: "homeassistant"
    bucket: "mseg-tester"
    token: "${INFLUX_TOKEN}"

segments:
  - name: "128"
    type: native   # this trunk's untagged/native VLAN -- arrives directly on the trunk NIC, no 802.1Q tag. At most one segment may be "native"; every other segment must be "vlan".
    dnsServer: "192.168.128.5"
    dnsServer6: "fd00:192:168:128::5"
    dnsCheck:
      local:
        tests:
          - "mam-hh-gw.128.adviser.com."
      remote:
        tests:
          - "google.com."
    reverseCheck:
      ip: "192.168.128.1"                       # the segment's gateway -- conventionally .1
      expect: "mam-hh-gw.128.adviser.com."
    reverseCheck6:
      ip: "fd00:192:168:128::1"                 # IPv6 gateway -- conventionally ::1
      expect: "mam-hh-gw.128.adviser.com."
    routingCheck: "1.1.1.1:443"
    routingCheck6: "[2606:4700:4700::1111]:443"

  - name: "129"
    type: vlan     # a normal 802.1Q-tagged sub-interface. ifname: is optional -- only needed if your naming convention differs from "<trunkInterface>.<name>".
    dnsServer: "192.168.129.5"
    dnsServer6: "fd00:192:168:129::5"
    dnsCheck:
      local:
        tests:
          - "mam-hh-dmz.adviser.com."
      remote:
        tests:
          - "google.com."
    reverseCheck:
      ip: "192.168.129.1"
      expect: "mam-hh-dmz.adviser.com."
    reverseCheck6:
      ip: "fd00:192:168:129::1"
      expect: "mam-hh-dmz.adviser.com."
    routingCheck: "1.1.1.1:443"
    routingCheck6: "[2606:4700:4700::1111]:443"

  - name: "130"
    type: vlan
    dnsServer: "192.168.130.5"
    dnsServer6: "fd00:192:168:130::5"
    dnsCheck:
      local:
        tests:
          - "for-130.adviser.com."
      remote:
        tests:
          - "google.com."
          - "heise.de."           # a real German site -- some sense the VPN exit's DNS forwarding also looks regionally sane
    geoCheck:
      url: "https://ifconfig.co/country"
      expect: "Germany"        # mullvad-de exit
    routingCheck: "1.1.1.1:443"
    routingCheck6: "[2606:4700:4700::1111]:443"

  - name: "131"
    type: vlan
    dnsServer: "192.168.131.5"
    dnsServer6: "fd00:192:168:131::5"
    dnsCheck:
      local:
        tests:
          - "mullvad-us.adviser.com."
      remote:
        tests:
          - "google.com."
    geoCheck:
      url: "https://ifconfig.co/country"
      expect: "United States"  # mullvad-us exit
    routingCheck: "1.1.1.1:443"
    routingCheck6: "[2606:4700:4700::1111]:443"
