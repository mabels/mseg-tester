# Example config.yaml -- the real, content-level config (see
# internal/config and internal/bootstrap's package docs for the full
# split rationale). Two ways to get this file onto the VM:
#
#   1. EASY: cloud-init writes it directly (see cloud-init/user-data.yaml's
#      plain config.yaml write_files entry, or -config-file on
#      cmd/verify-mseg-tester) -- no repo, no token. Changing it means
#      editing and re-provisioning.
#   2. Set bootstrap.yaml's configRepo to a repo URL holding this same
#      file -- it's then fetched/refreshed at runtime (internal/configsync)
#      on every boot on updateSegment, and changing it is a commit, not a
#      re-provision. Only needed once you actually want that.
#
# routingCheck6 is optional -- see internal/config's doc comments. Worth
# setting on a dual-stack network like this one: OVN here can only ever
# deliver a SOLICITED router advertisement (its own periodic RA is
# unconditionally dropped -- see internal/checks' package doc), so these
# checks double as an ongoing regression check for that, not just
# IPv4/IPv6 parity.
#
# dnsCheck is a single flat list of tests, run against a shared set of
# "servers":
#   - servers: which resolver(s) EVERY test below runs against, unless a
#     test sets its own "servers" to override that for just itself. Each
#     entry is either:
#       * "system" -- the system's default resolver (/etc/resolv.conf,
#         normally this segment's own resolver via DHCP)
#       * a literal IP address (v4 or v6) -- dialed directly on port 53,
#         bypassing resolv.conf. Any reachable address works, not just
#         this segment's own resolver -- e.g. a public resolver like
#         "1.1.1.1" to prove the segment can reach one, alongside the
#         segment's own local resolver addresses below.
#   - tests: each has a "type" plus whatever fields that type needs --
#       * A / AAAA   -- host: resolves host as that record type; passes
#         as soon as it gets any answer (no expected value, no round
#         trip). Use for plain reachability checks like google.com.
#       * A-PTR / AAAA-PTR -- host: forward-resolves host (A for A-PTR,
#         AAAA for AAAA-PTR -- the address family is fixed by the type
#         itself, regardless of which server answers it), reverse-
#         resolves the first answer, and expects the PTR name to equal
#         host -- a full forward-confirmed round trip. Use for a fixed,
#         known-good record like a segment's own gateway.
#       * Hostname4 / Hostname6 -- domain: same round trip as
#         A-PTR/AAAA-PTR (forcing A or AAAA respectively), but against
#         THIS VM's own dynamically-registered hostname
#         (os.Hostname()+"."+domain) instead of a fixed name -- proves
#         dynamic DNS registration (both directions) actually works for
#         this specific roaming host, not just that the resolver can
#         answer one known-good static record.
#
# Every segment below lists its own local resolver's IPv4 and IPv6
# addresses (conventionally <subnet>.5 / <subnet6>::5) directly in
# "servers" alongside "system", its own local zone (A), google.com/
# amazon.com (A, catching "answers its own zone but doesn't forward
# upstream" vs. the reverse), an A-PTR AND an AAAA-PTR test against its
# own gateway (conventionally .1/::1, PTR "mam-hh-gw.<segment's
# domain>."), and a Hostname4 test against its own DDNS zone. The domain
# used throughout (adviser.com) is real and intentionally public.
#
# Only "Hostname4" is used, not "Hostname6": this network has no IPv6
# DHCP yet, so there's no dynamic AAAA/PTR6 registration for a
# "Hostname6" test to round-trip against -- see internal/checks.go's
# package doc. "A-PTR"/"AAAA-PTR" have no such gap (every gateway has a
# real static IPv6 PTR record already), so both run against the full
# segment-wide "servers" list.
#
# A segment may also be type: wifi -- a dedicated Wi-Fi radio passed
# through to this VM, associating to ssid/psk instead of riding any VLAN
# at all. Unlike "native"/"vlan", there's no trunk-derived default
# interface name -- instead pick ONE of three ways to identify the radio
# (internal/ifdiscover.Find, checked in this priority order): ifname (a
# literal name, e.g. "wlan0" -- simplest, but only stays correct until
# something reshuffles this VM's virtual PCI slot numbering and udev
# renames it), mac (a hardware address -- stable across that), or
# pciVendor+pciDevice (ditto, via PCI vendor:device ID -- what's used
# below, since it's what `lspci -nnk` on the Proxmox host shows before
# passthrough even happens, no need to boot the VM once just to read its
# MAC first). Leaving all three unset means "auto" -- the first Wi-Fi-
# capable interface found, whatever that turns out to be; fine with only
# one radio in the machine, ambiguous with more than one. `mseg-tester
# find-iface` resolves any of these standalone, for checking by hand.
#
# psk is written as "${VAR}" and expanded the same way report.influx.token
# is -- see internal/config.Segment.PSK's doc comment; this project's own
# convention is WIFI_<segment name>_SSID/WIFI_<segment name>_PSK in .env,
# e.g. WIFI_128_SSID/WIFI_128_PSK below. Each wifi-* segment here mirrors
# its same-numbered VLAN segment's checks -- same destination network,
# same expected geo, just reached over the air instead of over the wire.

rebootDelay: "2m"   # applies on EVERY segment, before rebooting into the next one -- gives a window to log into the box and inspect it (e.g. a slow/hung boot) before it cycles away. Paid once PER SEGMENT, so a full cycle now takes roughly (segment count x rebootDelay) longer. omit/"" for immediate everywhere (the old default).

checkAttempts: 3       # how many times to try EACH check before giving up on it. stops as soon as one attempt passes. defaults to 3 if omitted.
checkRetryDelay: "10s" # wait between attempts of the SAME check. defaults to "10s" if omitted.

timezone: "Europe/Berlin" # optional IANA zone name, applied via `timedatectl set-timezone` at the start of every run -- idempotent, so safe on every boot. Omit to leave the base image's timezone (normally UTC) alone. Lives here, not in bootstrap.yaml, since it's content that can change without re-provisioning the VM -- see internal/config.Config.Timezone.

report:
  # Writes straight into an existing InfluxDB v2 instance -- see
  # internal/report.PushInflux. "url" is InfluxDB's own base URL, not a
  # path you have to build yourself. "token" MUST be a write-only token
  # scoped to ONLY this one bucket (`influx auth create --write-bucket
  # <id>`) -- never the InfluxDB admin/all-access token.
  #
  # "${INFLUX_TOKEN}" here is NOT a literal value -- it's expanded at
  # load time (internal/envfile) from bootstrap.yaml's EnvFile (defaults
  # to /etc/mseg-tester/.env, written once by cloud-init, 0600, never
  # synced anywhere) or the real process environment. This is what lets
  # config.yaml itself -- which may be fetched from a shared or even
  # public configRepo -- stay free of the actual secret; only the small,
  # local-only .env file ever holds it.
  influx:
    url: "https://mam-influx.adviser.com"
    org: "homeassistant"
    bucket: "mseg-tester"
    token: "${INFLUX_TOKEN}"

segments:
  - name: "128"
    type: native   # this trunk's untagged/native VLAN -- arrives directly on the trunk NIC, no 802.1Q tag. At most one segment may be "native"; every other segment must be "vlan".
    dnsCheck:
      servers: ["system", "192.168.128.5", "fd00:192:168:128::5"]
      tests:
        - type: A
          host: "mam-hh-gw.mam-hh.adviser.com."
        - type: A
          host: "google.com."
        - type: A
          host: "amazon.com."
        - type: A-PTR
          host: "mam-hh-gw.mam-hh.adviser.com."   # the segment's gateway -- conventionally .1/::1
        - type: AAAA-PTR
          host: "mam-hh-gw.mam-hh.adviser.com."
        - type: Hostname4
          domain: "mam-hh.adviser.com."           # this segment's dynamic-DNS zone
    routingCheck: "1.1.1.1:443"
    routingCheck6: "[2606:4700:4700::1111]:443"

  - name: "wifi-128"
    type: wifi                    # dedicated Wi-Fi radio, not a VLAN -- see the note above
    pciVendor: "14c3"             # MediaTek MT7922 -- identifies the physical card, stable across a PCI-slot renumbering an ifname: literal wouldn't survive; see the note above
    pciDevice: "0616"
    ssid: "${WIFI_128_SSID}"
    psk: "${WIFI_128_PSK}"
    dnsCheck:                     # same expectations as segment "128" -- same destination network, reached over the air
      servers: ["system", "192.168.128.5", "fd00:192:168:128::5"]
      tests:
        - type: A
          host: "mam-hh-gw.mam-hh.adviser.com."
        - type: A
          host: "google.com."
        - type: A
          host: "amazon.com."
        - type: A-PTR
          host: "mam-hh-gw.mam-hh.adviser.com."
        - type: AAAA-PTR
          host: "mam-hh-gw.mam-hh.adviser.com."
        - type: Hostname4
          domain: "mam-hh.adviser.com."
    routingCheck: "1.1.1.1:443"
    routingCheck6: "[2606:4700:4700::1111]:443"

  - name: "129"
    type: vlan     # a normal 802.1Q-tagged sub-interface. ifname: is optional -- only needed if your naming convention differs from "<trunkInterface>.<name>".
    dnsCheck:
      servers: ["system", "192.168.129.5", "fd00:192:168:129::5"]
      tests:
        - type: A
          host: "mam-hh-gw.mam-hh-dmz.adviser.com."
        - type: A
          host: "google.com."
        - type: A
          host: "amazon.com."
        - type: A-PTR
          host: "mam-hh-gw.mam-hh-dmz.adviser.com."
        - type: AAAA-PTR
          host: "mam-hh-gw.mam-hh-dmz.adviser.com."
        - type: Hostname4
          domain: "mam-hh-dmz.adviser.com."
    routingCheck: "1.1.1.1:443"
    routingCheck6: "[2606:4700:4700::1111]:443"

  - name: "130"
    type: vlan
    dnsCheck:
      servers: ["system", "192.168.130.5", "fd00:192:168:130::5"]
      tests:
        - type: A
          host: "mam-hh-gw.for-130.adviser.com."
        - type: A
          host: "google.com."
        - type: A
          host: "amazon.com."
        - type: A-PTR
          host: "mam-hh-gw.for-130.adviser.com."
        - type: AAAA-PTR
          host: "mam-hh-gw.for-130.adviser.com."
        - type: Hostname4
          domain: "for-130.adviser.com."
    geoCheck:
      url: "https://ifconfig.co/country"
      expect: "Germany"        # mullvad-de exit
    routingCheck: "1.1.1.1:443"
    routingCheck6: "[2606:4700:4700::1111]:443"

  - name: "wifi-130"
    type: wifi
    pciVendor: "14c3"   # MediaTek MT7922 -- same physical radio as wifi-128
    pciDevice: "0616"
    ssid: "${WIFI_130_SSID}"
    psk: "${WIFI_130_PSK}"
    dnsCheck:
      servers: ["system", "192.168.130.5", "fd00:192:168:130::5"]
      tests:
        - type: A
          host: "mam-hh-gw.for-130.adviser.com."
        - type: A
          host: "google.com."
        - type: A
          host: "amazon.com."
        - type: A-PTR
          host: "mam-hh-gw.for-130.adviser.com."
        - type: AAAA-PTR
          host: "mam-hh-gw.for-130.adviser.com."
        - type: Hostname4
          domain: "for-130.adviser.com."
    geoCheck:
      url: "https://ifconfig.co/country"
      expect: "Germany"        # mullvad-de exit
    routingCheck: "1.1.1.1:443"
    routingCheck6: "[2606:4700:4700::1111]:443"

  - name: "131"
    type: vlan
    dnsCheck:
      servers: ["system", "192.168.131.5", "fd00:192:168:131::5"]
      tests:
        - type: A
          host: "mam-hh-gw.mullvad-us.adviser.com."
        - type: A
          host: "google.com."
        - type: A
          host: "amazon.com."
        - type: A-PTR
          host: "mam-hh-gw.mullvad-us.adviser.com."
        - type: AAAA-PTR
          host: "mam-hh-gw.mullvad-us.adviser.com."
        - type: Hostname4
          domain: "mullvad-us.adviser.com."
    geoCheck:
      url: "https://ifconfig.co/country"
      expect: "United States"  # mullvad-us exit
    routingCheck: "1.1.1.1:443"
    routingCheck6: "[2606:4700:4700::1111]:443"

  - name: "wifi-131"
    type: wifi
    pciVendor: "14c3"   # MediaTek MT7922 -- same physical radio as wifi-128
    pciDevice: "0616"
    ssid: "${WIFI_131_SSID}"
    psk: "${WIFI_131_PSK}"
    dnsCheck:
      servers: ["system", "192.168.131.5", "fd00:192:168:131::5"]
      tests:
        - type: A
          host: "mam-hh-gw.mullvad-us.adviser.com."
        - type: A
          host: "google.com."
        - type: A
          host: "amazon.com."
        - type: A-PTR
          host: "mam-hh-gw.mullvad-us.adviser.com."
        - type: AAAA-PTR
          host: "mam-hh-gw.mullvad-us.adviser.com."
        - type: Hostname4
          domain: "mullvad-us.adviser.com."
    geoCheck:
      url: "https://ifconfig.co/country"
      expect: "United States"  # mullvad-us exit
    routingCheck: "1.1.1.1:443"
    routingCheck6: "[2606:4700:4700::1111]:443"
