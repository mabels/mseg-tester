#cloud-config
# mseg-tester first-boot provisioning.
#
# Prerequisite (one-time, manual, in Proxmox -- NOT automated, and
# deliberately so -- see the whole point of this tool's design): this
# VM's one virtual NIC must be a TRUNK port carrying every segment's
# 802.1Q VLAN tag (128/129/130/131). Nothing after this file ever touches
# Proxmox again -- every subsequent network change is this VM rewriting
# its own netplan config and rebooting into it.
#
# Replace TRUNK_IFACE below with whatever this VM's guest NIC is actually
# named (commonly ens18 on Proxmox's default virtio model -- check with
# `ip link` on first boot if unsure, then fix this file and re-provision).
#
# First boot brings up segment 129 (the management segment) directly --
# that's the one segment with a real route to the internet/GitHub, and
# mseg-tester's own cycle always starts wherever cloud-init left it.

hostname: mseg-tester

package_update: true
package_upgrade: true    # dist-upgrade everything already installed on first boot, not just refresh the apt index
packages:
  - ca-certificates
  - git                   # for the local checkout mseg-tester-bootstrap.sh clones and internal/selfupdate keeps updated
  - wpasupplicant         # required for netplan's wifis: stanza -- see the segment "wifi-*" entries in config.yaml below
  - linux-firmware        # the mt7921e driver (MediaTek MT7922) needs firmware blobs not always current on the base
                          # cloud image -- confirmed live: "Direct firmware load for mediatek/WIFI_MT7922_patch_mcu_1_1_hdr.bin
                          # failed with error -2 (ENOENT)" / "hardware init failed" until this is upgraded/(re)installed

write_files:
  # Initial netplan: segment 129 only, same shape mseg-tester itself
  # writes on every subsequent cycle (see internal/netplan) -- this file
  # gets wholesale-overwritten by the binary from its first run onward,
  # this copy only matters for getting from cloud-init to that first run.
  #
  # "optional: true" on the trunk interface itself tells
  # systemd-networkd-wait-online not to block boot waiting for IT
  # specifically to become "routable" -- it never will, it's a pure VLAN
  # carrier with no address of its own. Without this, boot can hang for a
  # long time (observed: "no limit" on systemd-networkd-wait-online.service).
  #
  # NOTE: this block assumes updateSegment (129 below) is a normal TAGGED
  # VLAN, not this trunk's native/untagged segment. If config.yaml's
  # segment 129 entry below were instead type: native (the SAME segment
  # as updateSegment), this initial netplan needs to change shape too --
  # configure TRUNK_IFACE directly (dhcp4: true, no vlans stanza, no
  # "optional") instead, the same way internal/netplan.Write's native
  # branch does. Not needed for the default 128=native/129=updateSegment
  # split.
  - path: /etc/netplan/90-mseg-tester.yaml
    permissions: "0600"
    content: |
      network:
        version: 2
        ethernets:
          TRUNK_IFACE:
            dhcp4: false
            dhcp6: false
            optional: true
        vlans:
          TRUNK_IFACE.129:
            id: 129
            link: TRUNK_IFACE
            dhcp4: true
            dhcp6: false
            accept-ra: true
            link-local: [ipv4, ipv6]

  # Local, rare-to-change facts -- see internal/bootstrap.
  #
  # Two ways to provide the real, content-level config.yaml (segment
  # list, test targets, timing, report target) -- pick ONE:
  #
  #   1. EASY (the default below): leave configRepo empty and just fill
  #      in the plain /mseg-tester/config.yaml write_files entry
  #      further down. No private repo, no token, nothing fetched at
  #      runtime -- changing it means editing this file and
  #      re-provisioning the VM, which is fine to start with.
  #   2. Set configRepo to a private repo's URL (e.g.
  #      https://github.com/owner/repo) and configToken to a
  #      fine-grained, read-only, repo-scoped GitHub PAT -- config.yaml
  #      is then fetched and refreshed at runtime (internal/configsync)
  #      on every boot on updateSegment, and changing it is a commit,
  #      not a VM re-provision. Treat configToken with the same care as
  #      any other credential-bearing file.
  - path: /mseg-tester/bootstrap.yaml
    permissions: "0600"
    content: |
      trunkInterface: TRUNK_IFACE
      updateSegment: "129"
      softwareRepo: "mabels/mseg-tester"
      softwareRef: "main"  # git branch/tag/commit the local checkout tracks (internal/selfupdate)
      configRepo: ""      # optional: set to a URL to fetch config.yaml from a private repo instead
      configPath: "config.yaml"
      configRef: "main"
      configToken: ""     # only needed if configRepo is set and private
      stateDir: "/mseg-tester"
      configLocalPath: "/mseg-tester/config.yaml"

  # The plain config.yaml used when configRepo above is left empty (the
  # default/easy path) -- see examples/config.yaml for the same shape
  # with more commentary. Lives in the same /mseg-tester directory as
  # bootstrap.yaml/active.yaml/*.result.yaml now -- nothing under /etc at
  # all -- but remains conceptually distinct: this genuinely changes on
  # its own schedule (self-update/config-sync/report all touch state on
  # updateSegment), unlike bootstrap.yaml's static, rarely-changing
  # facts. If you DO set configRepo, this file is still what's used
  # until the first successful sync overwrites it -- harmless to leave
  # in place either way.
  - path: /mseg-tester/config.yaml
    permissions: "0644"
    content: |
      rebootDelay: "6m"
      checkAttempts: 3
      checkRetryDelay: "10s"

      # report.url/report.influx are left unset here (no push configured
      # for this default static config) -- report exists at all purely to
      # host wait below. Throttles config-sync/self-update/report (all
      # only ever attempted on updateSegment) to run at most once per
      # waitDelay, no matter how often the cycle happens to revisit "on"
      # -- see internal/config.Wait. Segment checks and rebootDelay above
      # are unaffected either way; this only gates that one block.
      report:
        wait:
          on: "129"        # must match updateSegment above
          waitDelay: "10m"

      segments:
        - name: "128"
          type: native   # arrives UNTAGGED on TRUNK_IFACE itself -- not a VLAN sub-interface
          dnsCheck:
            servers: ["system", "192.168.128.5", "fd00:192:168:128::5"]
            tests:
              - type: A
                host: "mam-hh-gw.mam-hh.adviser.com."
              - type: A
                host: "google.com."
              - type: A
                host: "amazon.com."
              - type: A-PTR
                host: "mam-hh-gw.mam-hh.adviser.com."   # gateway, conventionally .1
              - type: AAAA-PTR
                host: "mam-hh-gw.mam-hh.adviser.com."   # IPv6 gateway, conventionally ::1
              - type: Hostname4
                domain: "mam-hh.adviser.com."           # this segment's dynamic-DNS zone; see internal/checks' package doc
          routingCheck: "1.1.1.1:443"
          routingCheck6: "[2606:4700:4700::1111]:443"
        - name: "wifi-128"
          type: wifi   # dedicated Wi-Fi radio (passthrough), not a VLAN -- no trunk-derived default, unlike native/vlan (see README's interface-discovery note)
          pciVendor: "14c3"   # MediaTek MT7922
          pciDevice: "0616"
          ssid: "${WIFI_128_SSID}"
          psk: "${WIFI_128_PSK}"   # expanded from /mseg-tester/.env at runtime -- see the EnvFile write_files entry further down
          dnsCheck:
            servers: ["system", "192.168.128.5", "fd00:192:168:128::5"]
            tests:
              - type: A
                host: "mam-hh-gw.mam-hh.adviser.com."
              - type: A
                host: "google.com."
              - type: A
                host: "amazon.com."
              - type: A-PTR
                host: "mam-hh-gw.mam-hh.adviser.com."
              - type: AAAA-PTR
                host: "mam-hh-gw.mam-hh.adviser.com."
              - type: Hostname4
                domain: "mam-hh.adviser.com."
          routingCheck: "1.1.1.1:443"
          routingCheck6: "[2606:4700:4700::1111]:443"
        - name: "129"
          type: vlan
          dnsCheck:
            servers: ["system", "192.168.129.5", "fd00:192:168:129::5"]
            tests:
              - type: A
                host: "mam-hh-gw.mam-hh-dmz.adviser.com."
              - type: A
                host: "google.com."
              - type: A
                host: "amazon.com."
              - type: A-PTR
                host: "mam-hh-gw.mam-hh-dmz.adviser.com."
              - type: AAAA-PTR
                host: "mam-hh-gw.mam-hh-dmz.adviser.com."
              - type: Hostname4
                domain: "mam-hh-dmz.adviser.com."
          routingCheck: "1.1.1.1:443"
          routingCheck6: "[2606:4700:4700::1111]:443"
        - name: "130"
          type: vlan
          dnsCheck:
            servers: ["system", "192.168.130.5", "fd00:192:168:130::5"]
            tests:
              - type: A
                host: "mam-hh-gw.for-130.adviser.com."
              - type: A
                host: "google.com."
              - type: A
                host: "amazon.com."
              - type: A-PTR
                host: "mam-hh-gw.for-130.adviser.com."
              - type: AAAA-PTR
                host: "mam-hh-gw.for-130.adviser.com."
              - type: Hostname4
                domain: "for-130.adviser.com."
          geoCheck:
            url: "https://ifconfig.co/country"
            expect: "Germany"                      # mullvad-de exit
          routingCheck: "1.1.1.1:443"
          routingCheck6: "[2606:4700:4700::1111]:443"
        - name: "wifi-130"
          type: wifi
          pciVendor: "14c3"   # MediaTek MT7922 -- see README's interface-discovery note
          pciDevice: "0616"
          ssid: "${WIFI_130_SSID}"
          psk: "${WIFI_130_PSK}"
          dnsCheck:
            servers: ["system", "192.168.130.5", "fd00:192:168:130::5"]
            tests:
              - type: A
                host: "mam-hh-gw.for-130.adviser.com."
              - type: A
                host: "google.com."
              - type: A
                host: "amazon.com."
              - type: A-PTR
                host: "mam-hh-gw.for-130.adviser.com."
              - type: AAAA-PTR
                host: "mam-hh-gw.for-130.adviser.com."
              - type: Hostname4
                domain: "for-130.adviser.com."
          geoCheck:
            url: "https://ifconfig.co/country"
            expect: "Germany"                      # mullvad-de exit
          routingCheck: "1.1.1.1:443"
          routingCheck6: "[2606:4700:4700::1111]:443"
        - name: "131"
          type: vlan
          dnsCheck:
            servers: ["system", "192.168.131.5", "fd00:192:168:131::5"]
            tests:
              - type: A
                host: "mam-hh-gw.mullvad-us.adviser.com."
              - type: A
                host: "google.com."
              - type: A
                host: "amazon.com."
              - type: A-PTR
                host: "mam-hh-gw.mullvad-us.adviser.com."
              - type: AAAA-PTR
                host: "mam-hh-gw.mullvad-us.adviser.com."
              - type: Hostname4
                domain: "mullvad-us.adviser.com."
          geoCheck:
            url: "https://ifconfig.co/country"
            expect: "United States"                # mullvad-us exit
          routingCheck: "1.1.1.1:443"
          routingCheck6: "[2606:4700:4700::1111]:443"
        - name: "wifi-131"
          type: wifi
          pciVendor: "14c3"   # MediaTek MT7922 -- see README's interface-discovery note
          pciDevice: "0616"
          ssid: "${WIFI_131_SSID}"
          psk: "${WIFI_131_PSK}"
          dnsCheck:
            servers: ["system", "192.168.131.5", "fd00:192:168:131::5"]
            tests:
              - type: A
                host: "mam-hh-gw.mullvad-us.adviser.com."
              - type: A
                host: "google.com."
              - type: A
                host: "amazon.com."
              - type: A-PTR
                host: "mam-hh-gw.mullvad-us.adviser.com."
              - type: AAAA-PTR
                host: "mam-hh-gw.mullvad-us.adviser.com."
              - type: Hostname4
                domain: "mullvad-us.adviser.com."
          geoCheck:
            url: "https://ifconfig.co/country"
            expect: "United States"                # mullvad-us exit
          routingCheck: "1.1.1.1:443"
          routingCheck6: "[2606:4700:4700::1111]:443"

  # Local-only secrets referenced above as "${VAR}" -- expanded at
  # config.yaml LOAD time (internal/envfile), not by cloud-init itself, so
  # this file's own "${WIFI_128_SSID}" etc. above stay literal text right
  # up until mseg-tester actually reads config.yaml. Matches
  # bootstrap.Bootstrap.EnvFile's default path (/mseg-tester/.env) and
  # the same mechanism cmd/verify-mseg-tester's own -env-file uses (see
  # internal/verifyvm/user-data.yaml.tmpl) -- this file is the one place
  # that path has to be provisioned by hand instead, since there's no
  # separate create-time step here to do it for you.
  #
  # REPLACE every value below with the real SSID/password before
  # provisioning (same "hand-edit, then re-provision" workflow as
  # TRUNK_IFACE above) -- these placeholders will NOT resolve on their
  # own. 0600, never synced anywhere, same trust level as
  # bootstrap.yaml's configToken.
  - path: /mseg-tester/.env
    permissions: "0600"
    content: |
      WIFI_128_SSID=REPLACE_ME
      WIFI_128_PSK=REPLACE_ME
      WIFI_130_SSID=REPLACE_ME
      WIFI_130_PSK=REPLACE_ME
      WIFI_131_SSID=REPLACE_ME
      WIFI_131_PSK=REPLACE_ME

  # The actual build-and-install logic runs as a real shell script (not
  # inline `runcmd` entries) purely so it can retry in a loop -- cloud-init
  # boots this VM before there's necessarily any guarantee network-online
  # has fully settled. Retrying beats a `runcmd` entry that runs once,
  # fails, and leaves the box stuck with no binary.
  #
  # Builds straight from a local git checkout (`go build`, not `go
  # install` -- no GitHub release, no build pipeline, no asset to keep in
  # sync -- see internal/selfupdate's package doc) using
  # softwareRepo/softwareRef read directly out of bootstrap.yaml above,
  # so there's exactly one place those two values live. This script only
  # ever needs to run ONCE, ever: it clones the source, builds it, then
  # hands off to `mseg-tester deploy` (which installs the systemd unit),
  # then reboots into the first real cycle. config.yaml is already in
  # place from the write_files entry above (or, if bootstrap.yaml's
  # configRepo is set, gets synced by the running binary itself on the
  # first `run` -- internal/configsync, gated on being on updateSegment)
  # -- this script never needs to fetch it.
  #
  # The clone+fetch+reset sequence below deliberately mirrors
  # internal/selfupdate's own steady-state update logic exactly (clone
  # only if the checkout doesn't exist yet, then always fetch+reset to
  # softwareRef) -- one mechanism, described once, not two independently
  # -- the ONLY difference here is there's no baked-in commit to compare
  # against yet, so the very first build always happens unconditionally.
  #
  # The Go toolchain itself is installed via `snap install go --classic`,
  # not an apt package or a hand-extracted tarball from go.dev -- simpler
  # and one less thing this script has to manage itself (version
  # resolution, architecture detection, extraction). Assumes snapd is
  # already present, which it is on stock Ubuntu Server cloud images.
  # /snap/bin also has to be on the mseg-tester.service unit's own PATH
  # for later self-updates -- see internal/deploy/mseg-tester.service.
  - path: /usr/local/sbin/mseg-tester-bootstrap.sh
    permissions: "0755"
    content: |
      #!/bin/sh
      set -e
      export HOME="${HOME:-/root}"
      export PATH="/snap/bin:$PATH"

      if ! command -v go >/dev/null 2>&1; then
        echo "mseg-tester-bootstrap: installing Go via snap" | systemd-cat -t mseg-tester-bootstrap
        i=0
        until snap install go --classic; do
          i=$((i + 1))
          echo "mseg-tester-bootstrap: snap install go failed, attempt $i, retrying in 30s" | systemd-cat -t mseg-tester-bootstrap
          sleep 30
        done
      fi

      bootstrap_yaml="/mseg-tester/bootstrap.yaml"
      software_repo=$(sed -n 's/^softwareRepo: *"\(.*\)"/\1/p' "$bootstrap_yaml")
      software_ref=$(sed -n 's/^softwareRef: *"\(.*\)"/\1/p' "$bootstrap_yaml")
      [ -n "$software_ref" ] || software_ref="main"
      repo_url="https://github.com/${software_repo}.git"
      src_dir="/mseg-tester/src"
      dest="/usr/local/bin/mseg-tester"

      echo "mseg-tester-bootstrap: fetching ${repo_url}@${software_ref} into ${src_dir}" | systemd-cat -t mseg-tester-bootstrap
      i=0
      until \
        { [ -d "$src_dir/.git" ] || git clone --depth 1 "$repo_url" "$src_dir"; } && \
        git -C "$src_dir" fetch --depth 1 origin "$software_ref" && \
        git -C "$src_dir" reset --hard FETCH_HEAD && \
        (cd "$src_dir" && go build -o "${dest}.new" ./cmd/mseg-tester)
      do
        i=$((i + 1))
        echo "mseg-tester-bootstrap: attempt $i failed, retrying in 30s" | systemd-cat -t mseg-tester-bootstrap
        sleep 30
      done
      mv "${dest}.new" "$dest"
      echo "mseg-tester-bootstrap: binary installed" | systemd-cat -t mseg-tester-bootstrap

      # Deploy installs the systemd unit; the unit's own first `run` will
      # perform its own config-sync (since it boots straight onto
      # updateSegment) -- but doing one explicit sync-config pass here
      # too means a genuinely empty first boot doesn't have to wait for
      # that first `run` to discover the private repo is unreachable.
      echo "mseg-tester-bootstrap: running deploy" | systemd-cat -t mseg-tester-bootstrap
      "$dest" deploy

      echo "mseg-tester-bootstrap: deploy done, rebooting into first cycle" | systemd-cat -t mseg-tester-bootstrap
      systemctl reboot

  # Runs once, at boot, as its own unit rather than a cloud-init `runcmd`
  # entry -- so the retry loop above can genuinely block/sleep across
  # however many attempts it takes without cloud-init's own timeout
  # semantics getting involved. Disables itself after running: once
  # mseg-tester is deployed, ITS OWN unit (installed by `deploy`, see
  # internal/deploy) is what runs on every subsequent boot -- this
  # bootstrap unit's job is done after the first successful build.
  - path: /etc/systemd/system/mseg-tester-bootstrap.service
    permissions: "0644"
    content: |
      [Unit]
      Description=mseg-tester: one-time clone+build+deploy (retries until it succeeds)
      After=network-online.target
      Wants=network-online.target
      ConditionPathExists=!/usr/local/bin/mseg-tester

      [Service]
      Type=oneshot
      Environment=HOME=/root
      ExecStart=/usr/local/sbin/mseg-tester-bootstrap.sh
      ExecStartPost=/usr/bin/systemctl disable mseg-tester-bootstrap.service

      [Install]
      WantedBy=multi-user.target

runcmd:
  - [mkdir, -p, /mseg-tester]
  - [systemctl, enable, mseg-tester-bootstrap.service]

power_state:
  mode: reboot
  message: "mseg-tester: rebooting to start the fetch+deploy bootstrap"
  condition: true
